; Airona PHP configuration

[PHP]
; Error handling (disable display in production via env)
display_errors = ${PHP_DISPLAY_ERRORS:-Off}
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL

; Memory and execution limits
memory_limit = 256M
max_execution_time = 60
max_input_time = 60

; File uploads (for admin product image uploads)
upload_max_filesize = 20M
post_max_size = 25M
max_file_uploads = 20

; Date
date.timezone = UTC

; Session (Laravel manages sessions via Redis, but PHP session config still applies)
session.gc_maxlifetime = 7200

[opcache]
opcache.enable = ${PHP_OPCACHE_ENABLE:-1}
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = ${PHP_OPCACHE_VALIDATE_TIMESTAMPS:-1}
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1

[xdebug]
xdebug.mode = debug
xdebug.start_with_request = no
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.log_level = 0
