# Rate limiting zones
# limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=checkout:10m rate=10r/m;
# limit_req_zone $binary_remote_addr zone=promo:10m rate=30r/m;
# limit_req_zone $binary_remote_addr zone=redeem:10m rate=20r/m;
# limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name airona.com www.airona.com;

    # Cloudflare origin certificate (Full Strict mode)
    ssl_certificate     /etc/ssl/airona/origin.pem;
    ssl_certificate_key /etc/ssl/airona/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS (63072000 = 2 years; max-age enables HSTS preload submission)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    set $backend_root /var/www/html/public;
    set $frontend_root /var/www/frontend/dist;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://api.stripe.com https://o*.ingest.sentry.io; frame-src https://checkout.stripe.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com;" always;

    # ── Stripe Webhook ────────────────────────────────────────────────────────
    location = /api/v1/webhooks/stripe {
        root $backend_root;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Admin Login (strict rate limit) ──────────────────────────────────────
    location = /api/auth/login {
        root $backend_root;
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Checkout (rate limited) ───────────────────────────────────────────────
    location = /api/v1/checkout/sessions {
        root $backend_root;
        limit_req zone=checkout burst=5 nodelay;
        limit_req_status 429;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Promo code validation (rate limited) ──────────────────────────────────
    location = /api/v1/promotions/validate {
        root $backend_root;
        limit_req zone=promo burst=10 nodelay;
        limit_req_status 429;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Voucher redeem (rate limited) ────────────────────────────────────────
    location ~ ^/api/v1/admin/vouchers/[^/]+/redeem$ {
        root $backend_root;
        limit_req zone=redeem burst=10 nodelay;
        limit_req_status 429;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Laravel health check ──────────────────────────────────────────────────
    location = /up {
        root $backend_root;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
        access_log off;
    }

    # ── All other API & Sanctum routes ───────────────────────────────────────
    location ~ ^/(api|sanctum)/ {
        root $backend_root;
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        try_files $uri /index.php$is_args$args;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── PHP-FPM handler ───────────────────────────────────────────────────────
    location ~ \.php$ {
        root $backend_root;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $backend_root$fastcgi_script_name;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Laravel storage (public files) ───────────────────────────────────────
    location /storage/ {
        root $backend_root/..;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Frontend SPA ─────────────────────────────────────────────────────────
    location / {
        root $frontend_root;
        index index.html;
        try_files $uri $uri/ /index.html =404;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "index, follow" always;
    }

    # ── Static assets (long-lived cache) ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|webp|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root $frontend_root;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
