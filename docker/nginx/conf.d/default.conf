server {
    listen 80;
    server_name _;

    # Laravel backend root
    set $backend_root /var/www/html/public;
    # Frontend static build root (populated in production)
    set $frontend_root /var/www/frontend/dist;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;  # overridden per-location
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://api.stripe.com; frame-src https://checkout.stripe.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com;" always;

    # ── Stripe Webhook ────────────────────────────────────────────────────────
    # IMPORTANT: must read raw body — no buffering issues with default config
    location = /api/v1/webhooks/stripe {
        root $backend_root;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        # No rate limiting on webhook — Stripe sends from known IPs
        # Stripe signature verification happens in Laravel middleware
    }

    # ── Admin Login (strict rate limit) ──────────────────────────────────────
    location = /api/auth/login {
        root $backend_root;
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        # No indexing for API responses
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Checkout (rate limited) ───────────────────────────────────────────────
    location = /api/v1/checkout/sessions {
        root $backend_root;
        limit_req zone=checkout burst=5 nodelay;
        limit_req_status 429;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Promo code validation (rate limited) ──────────────────────────────────
    location = /api/v1/promotions/validate {
        root $backend_root;
        limit_req zone=promo burst=10 nodelay;
        limit_req_status 429;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Voucher redeem (rate limited) ────────────────────────────────────────
    location ~ ^/api/v1/admin/vouchers/[^/]+/redeem$ {
        root $backend_root;
        limit_req zone=redeem burst=10 nodelay;
        limit_req_status 429;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Laravel health check & internal routes ───────────────────────────────
    location = /up {
        root $backend_root;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $backend_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── All other API & Sanctum routes ───────────────────────────────────────
    location ~ ^/(api|sanctum)/ {
        root $backend_root;
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        try_files $uri /index.php$is_args$args;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── PHP-FPM handler ───────────────────────────────────────────────────────
    location ~ \.php$ {
        root $backend_root;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $backend_root$fastcgi_script_name;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        include fastcgi_params;
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Laravel storage (public files) ───────────────────────────────────────
    location /storage/ {
        root $backend_root/..;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Frontend SPA (static files — production) ─────────────────────────────
    # In development, the Vite dev server handles frontend at localhost:5173.
    # This block serves the built dist/ in production.
    # The =404 fallback prevents redirect loops when dist/ doesn't exist yet.
    location / {
        root $frontend_root;
        index index.html;
        try_files $uri $uri/ /index.html =404;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        # Public pages are indexable — override server-level noindex default
        add_header X-Robots-Tag "index, follow" always;
    }

    # ── Static assets (long-lived cache) ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|webp|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root $frontend_root;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
