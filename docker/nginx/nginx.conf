user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting zones
    # Strict: login + checkout (anti-fraud, anti-brute-force)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=checkout:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=promo:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=redeem:10m rate=20r/m;
    # General API
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # Client body buffer (needed for Stripe webhook raw body)
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    include /etc/nginx/conf.d/*.conf;
}
