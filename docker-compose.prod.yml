services:

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/airona:/etc/ssl/airona:ro
      - frontend_dist:/var/www/frontend/dist:ro
    depends_on:
      - app
    networks:
      - airona
    restart: unless-stopped

  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/app:${APP_VERSION:-latest}
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - storage_data:/var/www/html/storage/app
      - /var/www/html/storage/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PHP_OPCACHE_ENABLE: "1"
    networks:
      - airona
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php -r \"require '/var/www/html/vendor/autoload.php'; echo 'ok';\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  queue:
    image: ghcr.io/${GITHUB_REPOSITORY}/app:${APP_VERSION:-latest}
    working_dir: /var/www/html
    command: php artisan queue:work redis --queue=webhooks,high,default,low --sleep=3 --tries=3 --max-time=3600
    env_file: .env
    volumes:
      - storage_data:/var/www/html/storage/app
      - /var/www/html/storage/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - airona
    restart: unless-stopped

  scheduler:
    image: ghcr.io/${GITHUB_REPOSITORY}/app:${APP_VERSION:-latest}
    working_dir: /var/www/html
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction >> /dev/null 2>&1; sleep 60; done"
    env_file: .env
    volumes:
      - storage_data:/var/www/html/storage/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - airona
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - airona
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - airona
    restart: unless-stopped

networks:
  airona:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:
  frontend_dist:
