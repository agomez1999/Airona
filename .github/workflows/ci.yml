name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: PHP / Laravel ───────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: airona_test
          POSTGRES_USER: airona
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U airona -d airona_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, pgsql, redis, mbstring, xml, zip, bcmath, intl, gd, opcache
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Copy .env.testing
        run: |
          cp .env.example .env.testing
          sed -i 's/DB_HOST=postgres/DB_HOST=127.0.0.1/' .env.testing
          sed -i 's/REDIS_HOST=redis/REDIS_HOST=127.0.0.1/' .env.testing
          sed -i 's/DB_DATABASE=airona/DB_DATABASE=airona_test/' .env.testing

      - name: Generate application key
        run: php artisan key:generate --env=testing

      - name: Run migrations
        run: php artisan migrate --env=testing --force

      - name: Run Pest tests (Feature + Unit)
        run: php artisan test --parallel --env=testing

  # ── Backend: Code Quality ────────────────────────────────────────────────────
  backend-quality:
    name: Backend Code Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Laravel Pint (code style)
        run: vendor/bin/pint --test

      - name: Check PHP syntax
        run: find app -name "*.php" | xargs -P4 php -l | grep -v "No syntax errors" || true

  # ── Frontend: TypeScript + Unit Tests ────────────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Run Vitest unit tests
        run: npx vitest run --reporter=verbose

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: /api/v1
          VITE_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/client/
          retention-days: 1

  # ── E2E Tests (main branch only) ─────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start full application stack
        run: |
          cp .env.example .env
          # Inject CI-safe secrets
          echo "APP_KEY=$(openssl rand -base64 32)" >> .env
          echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_TEST_SECRET_KEY || 'sk_test_placeholder' }}" >> .env
          echo "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_placeholder' }}" >> .env
          docker compose up -d
          # Wait for services to be healthy
          timeout 60 bash -c 'until curl -sf http://localhost/up; do sleep 2; done'
          # Run migrations and seed test data
          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan db:seed --class=TestAdminSeeder --force

      - name: Run E2E tests
        run: npx playwright test
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          E2E_ADMIN_EMAIL: admin@airona.com
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'secret123' }}

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Lighthouse CI (Core Web Vitals) ──────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/client/

      - name: Install LHCI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun
        working-directory: frontend
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ── Release: Production deploy (tag push) ────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend, frontend, backend-quality]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/app:${{ github.ref_name }} \
            -f docker/php/Dockerfile \
            --target prod .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository }}/app:${{ github.ref_name }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/airona
            docker pull ghcr.io/${{ github.repository }}/app:${{ github.ref_name }}
            sed -i "s|image: ghcr.io/.*/app:.*|image: ghcr.io/${{ github.repository }}/app:${{ github.ref_name }}|" docker-compose.prod.yml
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force
            docker compose -f docker-compose.prod.yml exec -T app php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T app php artisan route:cache
            docker compose -f docker-compose.prod.yml exec -T app php artisan view:cache
            curl -sf http://localhost/up || exit 1
